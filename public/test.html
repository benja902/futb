<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Clappr Test</title>
  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
</head>

<body style="background:black; margin:0;">

<div id="player"></div>

<script>
  var player = new Clappr.Player({
    source: "/api/stream", // 🔥 CLAVE
    parentId: "#player",
    width: "100%",
    height: window.innerHeight,
    autoPlay: true,
    mute: true
  });
</script>

</body>
</html>
