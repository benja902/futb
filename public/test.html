<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Clappr HLS Test</title>

  <script src="https://cdn.jsdelivr.net/npm/@clappr/core@latest/dist/clappr-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@clappr/hlsjs-playback@latest/dist/hlsjs-playback.min.js"></script>
</head>
<body style="background:black; margin:0;">
  <div id="player"></div>

  <script>
    const player = new Clappr.Player({
      source: "/api/stream",
      parentId: "#player",
      width: "100%",
      height: window.innerHeight,
      autoPlay: true,
      mute: true,
      plugins: [HlsjsPlayback],
    });

    player.on(Clappr.Events.PLAYER_ERROR, function(err) {
      console.log("PLAYER_ERROR", err);
    });
  </script>
</body>
</html>
